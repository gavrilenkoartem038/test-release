name: Pull request

on:
  pull_request:

jobs:
  your-job:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: 'Get Previous tag'
      id: previoustag
      uses: "WyriHaximus/github-action-get-previous-tag@v1"
      with:
        fallback: 0.1.0

    - name: 'Get next minor version'
      id: semvers
      uses: "WyriHaximus/github-action-next-semvers@v1"
      with:
        version: ${{ steps.previoustag.outputs.tag }}

  get-changed-packages: 
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.get-packages.outputs.result }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
  
    - name: get-changed-files
      run: |
        CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | tr '\n' ',')
        echo "Changed files: $CHANGED_FILES"
        echo "changed_files=$CHANGED_FILES" >> $GITHUB_ENV
    
    - name: get-packages
      id: get-packages
      uses: actions/github-script@v7
      with:
        result-encoding: string
        script: |
          const changedFiles = process.env.changed_files.split(',').filter(name => name !== "");
          console.log(changedFiles);

          const resultArr = [];

          changedFiles.forEach((path) => {
            if (path.startsWith(".github/workflows")) {
              resultArr.push(...["app", "lib", "logger", "player"]);
            } else if (path.startsWith("packages/")) {
              const key = path.split("/")[1];

              if (key === "logger") {
                resultArr.push("logger");
              } else if (key === "app") {
                resultArr.push("app");
              } else if (key === "lib") {
                resultArr.push("lib");
              } else if (key === "tma") {
                resultArr.push("lib");
              } else if (key === "player") {
                resultArr.push("player", "lib");
              }
            }
          });

          const result = `${[...new Set(resultArr)].join(',')}`;
          console.log(result)

          return result;

  test-outputs:
    runs-on: ubuntu-latest
    needs: get-changed-packages
    if: contains(needs.get-changed-packages.outputs.changed_files, 'app')
    steps:
      - run: |
          echo "contain app"
          echo "Output from first job: ${{ needs.get-changed-packages.outputs.changed_files }}"
    

  get-commit-message:
    runs-on: ubuntu-latest
    needs: your-job
    outputs:
      commit-message: ${{ steps.get-commit-message.outputs.commit-message }}
    steps:
    - uses: actions/checkout@v4
    - name: Output latest commit message
      id: get-commit-message
      run: |
        git fetch origin ${{ github.event.pull_request.head.sha }}
        git checkout ${{ github.event.pull_request.head.sha }}
        COMMIT_MESSAGE=$(git log -1 --pretty=%B)
        echo "Commit Message: $COMMIT_MESSAGE"
        echo "commit-message=$COMMIT_MESSAGE" >> $GITHUB_OUTPUT
  

  test-e2e:
    runs-on: ubuntu-latest
    needs: get-commit-message 
    steps:
    - name: test if
      if: contains(needs.get-commit-message.outputs.commit-message, '[e2e]')
      run: |
        echo "contain [e2e]"